<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIN Rail Configurator</title>
  <meta name="description" content="Parametric DIN Rail Rack 3D Configurator">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <header>
        <h1>DIN Rail Configurator</h1>
        <p>Adjust parameters to update the 3D model</p>
      </header>
      
      <form id="config-form">
        <div class="form-group">
          <label for="numRails">Number of DIN Rails</label>
          <input type="number" id="numRails" name="numRails" value="2" min="1" max="5" step="1">
        </div>
        
        <div class="form-group">
          <label for="spacing">Spacing (mm)</label>
          <div class="range-container">
            <input type="range" id="spacing" name="spacing" value="50" min="20" max="100" step="5">
            <span id="spacing-val">50 mm</span>
          </div>
        </div>
        
        <div class="form-group">
          <label for="headDistance">Head Distance (mm)</label>
          <div class="range-container">
            <input type="range" id="headDistance" name="headDistance" value="20" min="0" max="50" step="10">
            <span id="headDistance-val">20 mm</span>
          </div>
        </div>
        
        <div class="form-group">
          <label for="footDistance">Foot Distance (mm)</label>
          <div class="range-container">
            <input type="range" id="footDistance" name="footDistance" value="20" min="0" max="50" step="10">
            <span id="footDistance-val">20 mm</span>
          </div>
        </div>
        

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="freestandingFoot" name="freestandingFoot" checked>
            Include freestanding foot
          </label>
        </div>
        
        <div id="foot-options-container">
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="frontFootRail" name="frontFootRail" checked>
              Include front foot DIN rail
            </label>
          </div>
          
          <div class="form-group">
            <label for="frontFootDepth">Front Foot Depth (mm)</label>
            <div class="range-container">
              <input type="range" id="frontFootDepth" name="frontFootDepth" value="40" min="20" max="80" step="10">
              <span id="frontFootDepth-val">40 mm</span>
            </div>
          </div>
          
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="backFootRail" name="backFootRail">
              Include back foot DIN rail
            </label>
          </div>
          
          <div class="form-group">
            <label for="backFootDepth">Back Foot Depth (mm)</label>
            <div class="range-container">
              <input type="range" id="backFootDepth" name="backFootDepth" value="40" min="20" max="80" step="10">
              <span id="backFootDepth-val">40 mm</span>
            </div>
          </div>
        </div>
        
        <div class="button-group">
          <button type="submit" id="generate-btn">
            <span class="btn-text">Generate Model</span>
            <span class="loader hidden"></span>
          </button>
          
          <button type="button" id="download-stl-btn">
            <span class="btn-text">Download STL</span>
            <span class="loader hidden"></span>
          </button>
        </div>
        
        <div class="advanced-mode">
          <p>Need exact millimeter precision? Open the full parametric model in <a id="advanced-link" href="https://cad.onshape.com/documents/e51df0b3cf2731be65ff4d8a/v/69059e9bb85521089f44040e/e/d8c5042a0e7c60372ca8a3fe" target="_blank">Onshape</a>.</p>
        </div>
      </form>
    </aside>
    
    <main class="viewer-container">
      <model-viewer id="onshape-viewer" alt="DIN Rail Rack" camera-controls auto-rotate style="width: 100%; height: 100%;"></model-viewer>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
