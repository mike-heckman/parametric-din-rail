<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIN Rail Configurator</title>
  <meta name="description" content="Parametric DIN Rail Rack 3D Configurator">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <header>
        <h1>DIN Rail Configurator</h1>
        <p>Adjust parameters to update the 3D model</p>
      </header>
      
      <form id="config-form">
        <div class="form-group">
          <label for="numRails">Number of DIN Rails</label>
          <input type="number" id="numRails" name="numRails" value="2" min="1" max="10">
        </div>
        
        <div class="form-group">
          <label for="spacing">Spacing (mm)</label>
          <input type="number" id="spacing" name="spacing" value="50" min="10" max="200" step="1">
        </div>
        
        <div class="form-group">
          <label for="headDistance">Head Distance (mm)</label>
          <input type="number" id="headDistance" name="headDistance" value="20" min="0" max="100" step="1">
        </div>
        
        <div class="form-group">
          <label for="footDistance">Foot Distance (mm)</label>
          <input type="number" id="footDistance" name="footDistance" value="20" min="0" max="100" step="1">
        </div>
        
        <div class="form-group">
          <label for="footPadHeight">Foot Pad Height (mm)</label>
          <input type="number" id="footPadHeight" name="footPadHeight" value="5" min="1" max="50" step="1">
        </div>
        
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="freestandingFoot" name="freestandingFoot" checked>
            Include freestanding foot
          </label>
        </div>
        
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="frontFootRail" name="frontFootRail" checked>
            Include front foot DIN rail
          </label>
        </div>
        
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="backFootRail" name="backFootRail" checked>
            Include back foot DIN rail
          </label>
        </div>
        
        <button type="submit" id="generate-btn">
          <span class="btn-text">Generate Model</span>
          <span class="loader hidden"></span>
        </button>
      </form>
    </aside>
    
    <main class="viewer-container">
      <!-- Embedded iframe for Onshape (Placeholder URL for now) -->
      <iframe id="onshape-viewer" src="about:blank" title="Onshape 3D Viewer" allowfullscreen></iframe>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
